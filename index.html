<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CIM Precision Scan Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div id="top-record">🔥 Best Accuracy: Loading...</div>
        </header>

        <main id="game-arena">
            <div id="qr-target" class="qr-behind">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=CIM-PAY" alt="QR">
            </div>

            <div id="moving-phone" class="iphone-frame">
                <div class="iphone-bezel">
                    <div class="dynamic-island"></div>
                    <div class="viewfinder" id="viewfinder">
                        <div class="corner top-left"></div>
                        <div class="corner top-right"></div>
                        <div class="corner bottom-left"></div>
                        <div class="corner bottom-right"></div>
                        <div class="laser-line"></div>
                    </div>
                </div>
            </div>

            <section id="screen-start" class="screen active">
                <div class="card">
                    <img id="logo-main" src="unnamed.jpg" alt="CIM" class="brand-logo">
                    <h1 class="title">CIM Precision<br><span class="highlight">Scan Challenge</span></h1>
                    <div class="input-group">
                        <input type="text" id="player-name" placeholder="Full Name">
                        <input type="text" id="player-epf" placeholder="EPF (Numbers Only)" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                    </div>
                    <button id="btn-start" class="btn-primary">START CHALLENGE</button>
                </div>
            </section>

            <section id="screen-game" class="screen">
                <div class="game-heading">
                    <h2>ALIGN & TAP</h2>
                    <p>Wait for the neon green glow!</p>
                </div>
                <div class="game-ui">
                    <button id="btn-stop" class="btn-pay">TAP TO PAY</button>
                </div>
            </section>

            <section id="screen-result" class="screen">
                <div class="card result-card">
                    <img src="unnamed.jpg" alt="CIM" class="brand-logo-small">
                    <h2 id="result-greeting">Scan Result</h2>
                    <div class="score-display">
                        <span id="result-score">0</span><small>px</small>
                    </div>
                    <p id="result-msg"></p>
                    <button id="btn-finish" class="btn-primary">FINISH SESSION</button>
                </div>
            </section>
        </main>

        <aside class="leaderboard-panel">
            <h3>🏆 Accuracy Leaders</h3>
            <ul id="leaderboard-list"></ul>
        </aside>
        
        <audio id="snd-scan" src="https://cdn.pixabay.com/audio/2022/03/15/audio_73060c41a5.mp3" preload="auto"></audio>
        <button id="admin-reset" title="Reset">⚙️</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
